name: ci

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dev image
        run: docker build --target dev -t opnsense-mcp:dev .
      - name: Ruff
        run: docker run --rm opnsense-mcp:dev ruff check .
      - name: Ruff format
        run: docker run --rm opnsense-mcp:dev ruff format --check .
      - name: Mypy
        run: docker run --rm opnsense-mcp:dev mypy src
      - name: Pytest
        run: docker run --rm opnsense-mcp:dev pytest --cov=opnsense_mcp --cov-report=term-missing
      - name: Build runtime image
        run: docker build --target runtime -t opnsense-mcp:ci .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Determine build version
        id: build_version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPNSENSE_MCP_BUILD_VERSION=${{ steps.build_version.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Prepare release bootstrap script
        env:
          RELEASE_IMAGE: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
        run: |
          mkdir -p dist
          python - <<'PY'
          import os
          from pathlib import Path

          source = Path("scripts/setup-local.sh").read_text(encoding="utf-8")
          updated = source.replace(
              'default_image="ghcr.io/addlockwood/opnsense-mcp:latest"',
              f'default_image="{os.environ["RELEASE_IMAGE"]}"',
              1,
          )
          Path("dist/setup-local.sh").write_text(updated, encoding="utf-8")
          PY
      - name: Upload bootstrap script to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/setup-local.sh
          prerelease: ${{ contains(github.ref_name, '-') }}
