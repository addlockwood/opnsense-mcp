name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build dev image
        run: docker build --target dev -t opnsense-mcp:dev .
      - name: Ruff
        run: docker run --rm opnsense-mcp:dev ruff check .
      - name: Ruff format
        run: docker run --rm opnsense-mcp:dev ruff format --check .
      - name: Mypy
        run: docker run --rm opnsense-mcp:dev mypy src
      - name: Pytest
        run: docker run --rm opnsense-mcp:dev pytest --cov=opnsense_mcp --cov-report=term-missing
      - name: Build runtime image
        run: docker build --target runtime -t opnsense-mcp:ci .

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Upload bootstrap script to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: scripts/setup-local.sh
