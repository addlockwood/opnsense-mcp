# Example Codex MCP configuration for a bootstrapped local launcher.
#
# Copy the server block into ~/.codex/config.toml and adjust the host path.
# The recommended stage-1 path is to use the generated launcher from your
# private router-state repo rather than embedding a raw docker command here.

[mcp_servers.opnsense]
command = "/ABSOLUTE/PATH/TO/private-router-state/run-opnsense-mcp.sh"
args = []
